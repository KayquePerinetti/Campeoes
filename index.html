<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Campeões do Campeonato</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
        padding: 200px;
    }

    h1{
        text-align: center;
        color: gold;
    }

    .container{
        max-width: 900px;
        margin: auto;
        background: #111827;
        padding: 20px;
        border-radius: 10px;
    }

    table{
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th, td{
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #333;
    }

    th{
        background: #1f2937;
        color: gold;
    }

    button{
        padding: 6px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 2px;
    }

    .delete{
        background: red;
        color: white;
    }

    .admin-box{
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    input{
        padding: 8px;
        border-radius: 5px;
        border: none;
    }

    .add{
        background: green;
        color: white;
    }

    .login{
        background: #2563eb;
        color: white;
    }

    .logout{
        background: #f97316;
        color: white;
    }

    .hidden{
        display: none;
    }

    .badge{
        background: gold;
        color: black;
        padding: 4px 8px;
        border-radius: 5px;
        font-weight: bold;
    }

    .section-title{
        margin-top: 30px;
        color: #38bdf8;
        text-align: center;
    }
</style>

</head>

<body>

<h1>🏆 Campeões do Campeonato</h1>

    <!-- TABELA PRINCIPAL -->
    <table>
        <thead>
            <tr>
                <th>Posição</th>
                <th>Campeão</th>
                <th>Ano</th>
            </tr>
            <tr>
    <td>1</td>
    <td>-</td>
    <td>2026</td>
</tr>

        </thead>
        <tbody id="tabela"></tbody>
    </table>

    <h2 class="section-title">📊 Ranking de Títulos</h2>

    <!-- TABELA DE RANKING -->
    <table>
        <thead>
            <tr>
                <th>Posição</th>
                <th>Campeão</th>
                <th>Títulos</th>
            </tr>
            <tr>
    <td>1</td>
    <td>-</td>
    <td>-</td>
</tr>
        </thead>
        <tbody id="ranking"></tbody>
    </table>

</div>


</body>
</html>
